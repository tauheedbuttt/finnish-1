<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exam History</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <a href="index.html" class="back-link">← Back to Home</a>

      <header class="exam-intro-header">
        <div class="exam-badge">📚 History</div>
        <h1>Past Attempts</h1>
        <p class="exam-subtitle">Review your exam sessions</p>
      </header>

      <div id="overallStatsSection" class="overall-stats-section hidden">
        <div class="stats-card">
          <h2>📊 This Week's Performance</h2>
          <div class="stats-grid">
            <div class="stat-item">
              <span class="stat-label">Total Attempts</span>
              <span class="stat-value" id="totalAttempts">0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Average Score</span>
              <span class="stat-value" id="averageScore">–</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Best Score</span>
              <span class="stat-value" id="bestScore">–</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Total Points Earned</span>
              <span class="stat-value" id="totalPointsEarned">0</span>
            </div>
          </div>
        </div>
      </div>

      <div id="emptyState" class="empty-state">
        <p>📋 No attempts yet. <a href="index.html">Start a new exam</a></p>
      </div>

      <div id="sessionsList" class="sessions-list hidden"></div>
    </div>

    <script src="db.js"></script>
    <script src="review.js"></script>
  </body>
</html>
